name: Daily price scrape

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 6:00 AM UK time (7:00 in summer)
  workflow_dispatch:        # lets you run it manually with a button

# never let two scrapes run at the same time - a second one waits its turn
concurrency:
  group: price-scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chrome chromium

      - name: Run the scraper
        run: python -u scraper.py

      - name: Save the results back to the repository
        run: |
          git config user.name "price-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Price data $(date +%F)"
          n=0
          until git push; do
            n=$((n+1))
            if [ $n -gt 3 ]; then echo "Giving up after 3 attempts"; exit 1; fi
            echo "Push rejected - syncing with the repository and retrying ($n/3)"
            git pull --rebase -X theirs origin main
          done
