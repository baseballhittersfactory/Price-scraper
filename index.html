<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&display=swap');
  :root {
    --bg:#101613; --panel:#182019; --line:#2A342C; --text:#E8EAE4;
    --muted:#8A968C; --amber:#FFB742; --green:#5DD98A; --red:#FF6B5E;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui, sans-serif; }
  .head-font { font-family:'Barlow Condensed','Arial Narrow',sans-serif; text-transform:uppercase; letter-spacing:.05em; }
  .mono { font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; }
  header { padding:16px 20px; border-bottom:2px solid var(--line); }
  h1 { font-size:30px; line-height:1; font-weight:700; }
  h1 span { color:var(--amber); }
  .sub { color:var(--muted); font-size:13px; margin-top:5px; }
  .controls { padding:14px 20px 4px; }
  #search { width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:10px 12px; font-size:15px; outline:none; }
  main { padding:14px 20px 20px; }
  .changes { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:16px; }
  .changes h2 { font-size:17px; font-weight:600; margin-bottom:6px; }
  .change-row { font-size:13px; padding:5px 0; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:6px 10px; align-items:baseline; }
  .change-row:first-of-type { border-top:none; }
  .drop { color:var(--green); } .rise { color:var(--red); }
  details.cat { border:1px solid var(--line); border-radius:10px; background:var(--panel); margin-bottom:10px; overflow:hidden; }
  details.cat > summary { list-style:none; cursor:pointer; padding:12px 14px; display:flex; justify-content:space-between; align-items:baseline; }
  details.cat > summary::-webkit-details-marker { display:none; }
  .cat-name { font-size:19px; font-weight:600; color:var(--amber); }
  .cat-count { color:var(--muted); font-size:13px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.06em; padding:6px 10px; }
  td { padding:7px 10px; border-top:1px solid var(--line); vertical-align:top; }
  td.price { text-align:right; color:var(--amber); white-space:nowrap; }
  td.site { color:var(--muted); white-space:nowrap; font-size:12px; }
  .delta { font-size:11px; display:block; }
  a { color:inherit; }
  .empty { border:1px dashed var(--line); border-radius:10px; padding:36px; text-align:center; color:var(--muted); }
  .note { color:var(--muted); font-size:12px; padding:6px 2px; }
  footer { padding:0 20px 26px; color:var(--muted); font-size:12px; }
  @media (max-width:600px){ th:nth-child(3),td:nth-child(3){display:none} }
</style>
</head>
<body>
<header>
  <h1 class="head-font">Price <span>Scoreboard</span></h1>
  <div class="sub" id="summary">Loading data…</div>
</header>

<div class="controls" style="display:none" id="controls">
  <input id="search" placeholder="Search all products… e.g. Rawlings ROLB1">
  <div class="note">Tap a category to open it. Tap any product to visit its page.</div>
</div>

<main>
  <section class="changes" id="changes" style="display:none">
    <h2 class="head-font">Price changes since previous run</h2>
    <div id="changeList"></div>
  </section>
  <div id="board"><div class="empty">Loading the latest prices…</div></div>
</main>

<footer>
  Data refreshes automatically each morning. Reload this page to pick up the
  newest numbers.
</footer>

<script>
const CATEGORY_ORDER = ["Bats","Balls","Batting Gloves","Fielding Gloves","Helmets",
  "Catchers Gear","Cleats","Training Equipment","Protection","Bags","Clothing",
  "Field Equipment","Accessories","Other"];
const SEARCH_CAP = 300;

let rows = [], prevMap = {}, byCat = {};

function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const out = []; let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"' && text[i+1] === '"'){ field += '"'; i++; }
      else if (c === '"'){ inQ = false; }
      else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ','){ row.push(field); field = ""; }
    else if (c === '\n' || c === '\r'){
      if (field !== "" || row.length){ row.push(field); out.push(row); row = []; field = ""; }
      if (c === '\r' && text[i+1] === '\n') i++;
    } else field += c;
  }
  if (field !== "" || row.length){ row.push(field); out.push(row); }
  const header = out.shift() || [];
  return out.filter(r => r.length === header.length)
            .map(r => Object.fromEntries(header.map((h, i) => [h.trim(), r[i]])));
}

async function loadCSV(path){
  const resp = await fetch(path + "?t=" + Date.now());
  if (!resp.ok) throw new Error(path + " -> HTTP " + resp.status);
  return parseCSV(await resp.text());
}

const gbp = (v) => "£" + Number(v).toFixed(2);
const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

function rowHTML(r){
  const prev = prevMap[r.url];
  let delta = "";
  if (prev != null){
    const d = Number(r.price) - prev;
    if (Math.abs(d) >= 0.005){
      const cls = d < 0 ? "drop" : "rise";
      const arrow = d < 0 ? "▼" : "▲";
      delta = `<span class="delta mono ${cls}">${arrow} ${gbp(Math.abs(d))}</span>`;
    }
  }
  return `<tr>
    <td><a href="${esc(r.url)}" target="_blank" rel="noreferrer">${esc(r.product)}</a></td>
    <td class="price mono">${gbp(r.price)}${delta}</td>
    <td class="site">${esc(r.site)}</td>
  </tr>`;
}

function tableHTML(list){
  return `<table>
    <tr><th>Product</th><th style="text-align:right">Price</th><th>Retailer</th></tr>
    ${list.map(rowHTML).join("")}
  </table>`;
}

function buildBoard(){
  const board = document.getElementById("board");
  const cats = Object.keys(byCat)
    .sort((a, b) => CATEGORY_ORDER.indexOf(a) - CATEGORY_ORDER.indexOf(b));
  board.innerHTML = cats.map(cat => `
    <details class="cat" data-cat="${esc(cat)}">
      <summary>
        <span class="cat-name head-font">${esc(cat)}</span>
        <span class="cat-count">${byCat[cat].length} products</span>
      </summary>
      <div class="slot"></div>
    </details>`).join("");
  board.querySelectorAll("details.cat").forEach(d => {
    d.addEventListener("toggle", () => {
      const slot = d.querySelector(".slot");
      if (d.open && !slot.dataset.built){
        slot.innerHTML = tableHTML(byCat[d.dataset.cat]);
        slot.dataset.built = "1";
      }
    });
  });
}

function renderSearch(q){
  const board = document.getElementById("board");
  q = q.toLowerCase();
  const hits = [];
  for (const r of rows){
    if (r.product.toLowerCase().includes(q) || r.site.toLowerCase().includes(q)){
      hits.push(r);
      if (hits.length > SEARCH_CAP) break;
    }
  }
  const capped = hits.length > SEARCH_CAP;
  board.innerHTML = hits.length
    ? `${tableHTML(hits.slice(0, SEARCH_CAP))}
       ${capped ? '<div class="note">Showing the first ' + SEARCH_CAP + ' matches - keep typing to narrow it down.</div>' : ''}`
    : '<div class="empty">Nothing matches that search.</div>';
}

function renderChanges(){
  const changes = [];
  for (const r of rows){
    const prev = prevMap[r.url];
    if (prev == null) continue;
    const d = Number(r.price) - prev;
    if (Math.abs(d) >= 0.005) changes.push({ ...r, from: prev, to: Number(r.price) });
  }
  if (!changes.length) return;
  changes.sort((x, y) => (x.to - x.from) - (y.to - y.from));
  document.getElementById("changes").style.display = "";
  document.getElementById("changeList").innerHTML = changes.slice(0, 50).map(c => `
    <div class="change-row">
      <span class="${c.to < c.from ? "drop" : "rise"} mono">${c.to < c.from ? "▼" : "▲"} ${gbp(c.from)} → ${gbp(c.to)}</span>
      <a href="${esc(c.url)}" target="_blank" rel="noreferrer">${esc(c.product)}</a>
      <span style="color:var(--muted)">${esc(c.site)}</span>
    </div>`).join("")
    + (changes.length > 50 ? `<div class="note">${changes.length - 50} more changes not shown.</div>` : "");
}

(async function init(){
  try {
    rows = await loadCSV("data/latest_prices.csv");
  } catch (e) {
    document.getElementById("board").innerHTML =
      '<div class="empty">No data yet. Run the scraper once (Actions tab), then reload.</div>';
    document.getElementById("summary").textContent = "Waiting for first scrape";
    return;
  }
  try {
    for (const r of await loadCSV("data/previous_prices.csv")){
      prevMap[r.url] = Number(r.price);
    }
  } catch (e) { /* no previous snapshot yet */ }

  byCat = {};
  for (const r of rows) (byCat[r.category] = byCat[r.category] || []).push(r);
  for (const cat in byCat)
    byCat[cat].sort((a, b) => a.product.localeCompare(b.product) || a.price - b.price);

  const sites = [...new Set(rows.map(r => r.site))];
  document.getElementById("summary").textContent =
    rows.length + " products · " + sites.length + " retailers · data from " + (rows[0]?.date || "");
  document.getElementById("controls").style.display = "";
  renderChanges();
  buildBoard();

  let timer = null;
  document.getElementById("search").addEventListener("input", e => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const q = e.target.value.trim();
      if (q.length >= 2) renderSearch(q);
      else buildBoard();
    }, 200);
  });
})();
</script>
</body>
</html>
