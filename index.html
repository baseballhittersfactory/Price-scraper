<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&display=swap');
  :root {
    --bg:#101613; --panel:#182019; --line:#2A342C; --text:#E8EAE4;
    --muted:#8A968C; --amber:#FFB742; --green:#5DD98A; --red:#FF6B5E;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui, sans-serif; }
  .head-font { font-family:'Barlow Condensed','Arial Narrow',sans-serif; text-transform:uppercase; letter-spacing:.05em; }
  .mono { font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; }

  header { padding:16px 20px; border-bottom:2px solid var(--line); display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:flex-end; }
  h1 { font-size:30px; line-height:1; font-weight:700; }
  h1 span { color:var(--amber); }
  .sub { color:var(--muted); font-size:13px; margin-top:5px; }

  .controls { padding:14px 20px 0; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .chip { border:1px solid var(--line); background:transparent; color:var(--text); border-radius:999px; padding:6px 14px; font-size:13px; cursor:pointer; }
  .chip.active { border-color:var(--amber); color:var(--amber); }
  #search { background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:8px 12px; font-size:14px; min-width:220px; flex:1; outline:none; }

  main { padding:20px; }
  .changes { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:20px; }
  .changes h2 { font-size:18px; font-weight:600; margin-bottom:8px; }
  .change-row { font-size:13px; padding:5px 0; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:6px 10px; align-items:baseline; }
  .change-row:first-of-type { border-top:none; }
  .drop { color:var(--green); } .rise { color:var(--red); }

  .cat-block { margin-bottom:26px; }
  .cat-title { font-size:20px; font-weight:600; color:var(--amber); border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:10px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.06em; padding:6px 8px; }
  td { padding:7px 8px; border-top:1px solid var(--line); vertical-align:top; }
  td.price { text-align:right; color:var(--amber); white-space:nowrap; }
  td.site { color:var(--muted); white-space:nowrap; font-size:13px; }
  a { color:inherit; }
  .empty { border:1px dashed var(--line); border-radius:10px; padding:36px; text-align:center; color:var(--muted); }
  footer { padding:0 20px 26px; color:var(--muted); font-size:12px; }
  @media (max-width:600px){ td.site{font-size:12px} th:nth-child(3),td:nth-child(3){display:none} }
</style>
</head>
<body>
<header>
  <div>
    <h1 class="head-font">Price <span>Scoreboard</span></h1>
    <div class="sub" id="summary">Loading data…</div>
  </div>
</header>

<div class="controls" id="controls" style="display:none">
  <input id="search" placeholder="Search products… e.g. Rawlings">
  <div id="chips"></div>
</div>

<main>
  <section class="changes" id="changes" style="display:none">
    <h2 class="head-font">Price changes since previous run</h2>
    <div id="changeList"></div>
  </section>
  <div id="board"><div class="empty">Loading the latest prices…</div></div>
</main>

<footer>
  Data refreshes automatically each morning when the scraper runs. Reload this
  page to pick up the newest numbers. Tap a product to open its page.
</footer>

<script>
const CATEGORY_ORDER = ["Bats","Balls","Batting Gloves","Fielding Gloves","Helmets",
  "Catchers Gear","Cleats","Training Equipment","Protection","Bags","Clothing",
  "Field Equipment","Accessories","Other"];

let rows = [], activeCat = "All", query = "";

function parseCSV(text){
  text = text.replace(/^\uFEFF/, "");
  const out = []; let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"' && text[i+1] === '"'){ field += '"'; i++; }
      else if (c === '"'){ inQ = false; }
      else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ','){ row.push(field); field = ""; }
    else if (c === '\n' || c === '\r'){
      if (field !== "" || row.length){ row.push(field); out.push(row); row = []; field = ""; }
      if (c === '\r' && text[i+1] === '\n') i++;
    } else field += c;
  }
  if (field !== "" || row.length){ row.push(field); out.push(row); }
  const header = out.shift() || [];
  return out.filter(r => r.length === header.length)
            .map(r => Object.fromEntries(header.map((h, i) => [h.trim(), r[i]])));
}

async function loadCSV(path){
  const resp = await fetch(path + "?t=" + Date.now());
  if (!resp.ok) throw new Error(path + " -> HTTP " + resp.status);
  return parseCSV(await resp.text());
}

function gbp(v){ return "£" + Number(v).toFixed(2); }

function renderChanges(history){
  const byKey = {};
  for (const r of history){
    const key = r.site + "|" + r.product;
    (byKey[key] = byKey[key] || []).push(r);
  }
  const changes = [];
  for (const key in byKey){
    const entries = byKey[key].sort((a, b) => a.date.localeCompare(b.date));
    // last two distinct dates for this product
    const dates = [...new Set(entries.map(e => e.date))];
    if (dates.length < 2) continue;
    const prev = entries.filter(e => e.date === dates[dates.length-2]).pop();
    const last = entries.filter(e => e.date === dates[dates.length-1]).pop();
    const a = parseFloat(prev.price), b = parseFloat(last.price);
    if (isFinite(a) && isFinite(b) && a !== b){
      changes.push({ site:last.site, product:last.product, url:last.url, from:a, to:b });
    }
  }
  if (!changes.length) return;
  changes.sort((x, y) => (x.to - x.from) - (y.to - y.from));
  document.getElementById("changes").style.display = "";
  document.getElementById("changeList").innerHTML = changes.slice(0, 40).map(c => `
    <div class="change-row">
      <span class="${c.to < c.from ? "drop" : "rise"} mono">${c.to < c.from ? "▼" : "▲"} ${gbp(c.from)} → ${gbp(c.to)}</span>
      <a href="${c.url}" target="_blank" rel="noreferrer">${c.product}</a>
      <span style="color:var(--muted)">${c.site}</span>
    </div>`).join("");
}

function renderBoard(){
  const board = document.getElementById("board");
  const q = query.toLowerCase();
  const visible = rows.filter(r =>
    (activeCat === "All" || r.category === activeCat) &&
    (!q || r.product.toLowerCase().includes(q) || r.site.toLowerCase().includes(q)));
  if (!visible.length){
    board.innerHTML = '<div class="empty">Nothing matches that filter.</div>';
    return;
  }
  const cats = [...new Set(visible.map(r => r.category))]
    .sort((a, b) => CATEGORY_ORDER.indexOf(a) - CATEGORY_ORDER.indexOf(b));
  board.innerHTML = cats.map(cat => {
    const items = visible.filter(r => r.category === cat)
      .sort((a, b) => a.product.localeCompare(b.product) || parseFloat(a.price) - parseFloat(b.price));
    return `
      <section class="cat-block">
        <h2 class="cat-title head-font">${cat} <span style="color:var(--muted);font-size:14px">${items.length}</span></h2>
        <table>
          <tr><th>Product</th><th style="text-align:right">Price</th><th>Retailer</th></tr>
          ${items.map(r => `
            <tr>
              <td><a href="${r.url}" target="_blank" rel="noreferrer">${r.product}</a></td>
              <td class="price mono">${gbp(r.price)}</td>
              <td class="site">${r.site}</td>
            </tr>`).join("")}
        </table>
      </section>`;
  }).join("");
}

function renderChips(){
  const cats = ["All", ...[...new Set(rows.map(r => r.category))]
    .sort((a, b) => CATEGORY_ORDER.indexOf(a) - CATEGORY_ORDER.indexOf(b))];
  const chips = document.getElementById("chips");
  chips.innerHTML = cats.map(c =>
    `<button class="chip head-font ${c === activeCat ? "active" : ""}" data-cat="${c}">${c}</button>`).join(" ");
  chips.querySelectorAll(".chip").forEach(btn => btn.onclick = () => {
    activeCat = btn.dataset.cat; renderChips(); renderBoard();
  });
}

(async function init(){
  try {
    rows = await loadCSV("data/latest_prices.csv");
  } catch (e) {
    document.getElementById("board").innerHTML =
      '<div class="empty">No data yet. Run the scraper once (Actions tab → Daily price scrape → Run workflow), then reload this page.</div>';
    document.getElementById("summary").textContent = "Waiting for first scrape";
    return;
  }
  const sites = [...new Set(rows.map(r => r.site))];
  const when = rows[0]?.date || "";
  document.getElementById("summary").textContent =
    rows.length + " products · " + sites.length + " retailers · data from " + when;
  document.getElementById("controls").style.display = "";
  document.getElementById("search").addEventListener("input", e => {
    query = e.target.value; renderBoard();
  });
  renderChips();
  renderBoard();
  try {
    renderChanges(await loadCSV("data/price_history.csv"));
  } catch (e) { /* history not available yet */ }
})();
</script>
</body>
</html>
